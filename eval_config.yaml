output_root: eval/outputs
scores_root: eval/scores
figures_root: eval/figures

# Some public benchmark parquet files return 401 from Xet CAS on RunPod.
# This affects dataset download only; the normal run.py model setup is unchanged.
disable_xet_for_benchmarks: true

# Full official test splits by default. Use run_eval.py --limit N for a smoke run.
benchmarks:
  - humaneval
  - mbpp
  - gsm8k
  - math500

generation:
  max_new_tokens: 512
  seed: 42
  experiments:
    - name: alpha1-step48
      alpha: 1.0
      steps: 48
    - name: alphanone-step96
      alpha: none
      steps: 96

scoring:
  code_timeout_seconds: 10
  # Public Math-Verify uses six decimal places for numeric equivalence.
  math_precision: 6
